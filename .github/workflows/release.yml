name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i'' -e "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        run: |
          BIN="target/${{ matrix.target }}/release/dex"
          DEST="dex-${{ matrix.target }}"
          cp "$BIN" "$DEST"
          chmod +x "$DEST"
          tar czf "${DEST}.tar.gz" -C "target/${{ matrix.target }}/release" dex

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/dex.exe"
          DEST="dex-${{ matrix.target }}.exe"
          cp "$BIN" "$DEST"

      - uses: actions/upload-artifact@v4
        with:
          name: dex-${{ matrix.target }}
          path: |
            dex-${{ matrix.target }}
            dex-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum dex-* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dex-*
            checksums.txt
